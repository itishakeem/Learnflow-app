apiVersion: dapr.io/v1alpha1
kind: Component
metadata:
  name: kafka-pubsub
  namespace: learnflow
spec:
  type: pubsub.kafka
  version: v1
  # Give Kafka extra time on cold start before Dapr gives up
  initTimeout: 120s
  metadata:
  - name: brokers
    value: "kafka:9092"
  - name: consumerGroup
    value: "learnflow"
  - name: authType
    value: "none"
  - name: initialOffset
    value: "newest"
  # Retry failed publishes up to 3 times with 2s backoff
  - name: maxRetries
    value: "3"
  - name: backOffDelay
    value: "2s"
  - name: backOffMaxDelay
    value: "10s"

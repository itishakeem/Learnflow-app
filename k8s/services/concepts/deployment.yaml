apiVersion: apps/v1
kind: Deployment
metadata:
  name: concepts-agent
  namespace: learnflow
spec:
  replicas: 1
  selector:
    matchLabels:
      app: concepts-agent
  template:
    metadata:
      labels:
        app: concepts-agent
      annotations:
        dapr.io/enabled: "true"
        dapr.io/app-id: "concepts-agent"
        dapr.io/app-port: "8000"
        dapr.io/log-level: "warn"
    spec:
      containers:
      - name: concepts-agent
        image: concepts-agent:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 8000
        env:
        - name: PUBSUB_NAME
          value: "kafka-pubsub"
        - name: TOPIC_NAME
          value: "learning.concept.generated"
        - name: GEMINI_MODEL
          value: "gemini-2.5-flash"
        - name: GEMINI_API_KEY
          valueFrom:
            secretKeyRef:
              name: gemini-secret
              key: api-key
        resources:
          requests:
            cpu: "100m"
            memory: "256Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 20
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: concepts-agent
  namespace: learnflow
spec:
  selector:
    app: concepts-agent
  ports:
  - port: 8000
    targetPort: 8000

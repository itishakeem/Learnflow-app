apiVersion: apps/v1
kind: Deployment
metadata:
  name: triage
  namespace: learnflow
spec:
  replicas: 1
  selector:
    matchLabels:
      app: triage
  template:
    metadata:
      labels:
        app: triage
      annotations:
        dapr.io/enabled: "true"
        dapr.io/app-id: "triage"
        dapr.io/app-port: "8000"
        dapr.io/log-level: "warn"
    spec:
      containers:
      - name: triage
        image: triage:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 8000
        env:
        - name: PUBSUB_NAME
          value: "kafka-pubsub"
        - name: TOPIC_NAME
          value: "learning.events"
        resources:
          requests:
            cpu: "50m"
            memory: "128Mi"
          limits:
            cpu: "200m"
            memory: "256Mi"
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 20
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: triage
  namespace: learnflow
spec:
  selector:
    app: triage
  ports:
  - port: 8000
    targetPort: 8000

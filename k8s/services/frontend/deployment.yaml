apiVersion: v1
kind: ConfigMap
metadata:
  name: frontend-config
  namespace: learnflow
data:
  TRIAGE_URL: "http://triage:8000"
  CONCEPTS_URL: "http://concepts:8000"
  EXERCISE_URL: "http://exercise:8000"
  PROGRESS_URL: "http://progress:8000"
  HOSTNAME: "0.0.0.0"
  PORT: "3000"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: learnflow
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: frontend
        image: learnflow-frontend:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 3000
        envFrom:
        - configMapRef:
            name: frontend-config
        resources:
          requests:
            cpu: "100m"
            memory: "256Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
        readinessProbe:
          httpGet:
            path: /dashboard
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /dashboard
            port: 3000
          initialDelaySeconds: 20
          periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: learnflow
spec:
  type: NodePort
  selector:
    app: frontend
  ports:
  - port: 3000
    targetPort: 3000
    nodePort: 30300

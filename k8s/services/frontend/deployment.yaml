apiVersion: v1
kind: ConfigMap
metadata:
  name: frontend-config
  namespace: learnflow
data:
  # Service names must match the K8s Service names in each deployment
  AUTH_URL:     "http://auth:8000"
  TRIAGE_URL:   "http://triage:8000"
  CONCEPTS_URL: "http://concepts-agent:8000"
  EXERCISE_URL: "http://exercise-agent:8000"
  PROGRESS_URL: "http://progress-agent:8000"
  DEBUG_URL:    "http://debug-agent:8000"
  HOSTNAME: "0.0.0.0"
  PORT: "3000"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: learnflow
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: frontend
        image: learnflow-frontend:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 3000
        envFrom:
        - configMapRef:
            name: frontend-config
        resources:
          requests:
            cpu: "100m"
            memory: "256Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
        # Use the lightweight / route, not /dashboard (which triggers SSR + API calls)
        readinessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 15
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        livenessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: learnflow
spec:
  type: NodePort
  selector:
    app: frontend
  ports:
  - port: 3000
    targetPort: 3000
    nodePort: 30300

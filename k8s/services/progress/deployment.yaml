apiVersion: apps/v1
kind: Deployment
metadata:
  name: progress-agent
  namespace: learnflow
spec:
  replicas: 1
  selector:
    matchLabels:
      app: progress-agent
  template:
    metadata:
      labels:
        app: progress-agent
      annotations:
        dapr.io/enabled: "true"
        dapr.io/app-id: "progress-agent"
        dapr.io/app-port: "8000"
        dapr.io/log-level: "warn"
    spec:
      # Wait for Kafka to be ready before starting — prevents Dapr component init failure
      initContainers:
      - name: wait-for-kafka
        image: busybox:1.36
        command: ['sh', '-c',
          'until nc -z kafka 9092; do echo "waiting for kafka..."; sleep 3; done; echo "kafka ready"']
      containers:
      - name: progress-agent
        image: progress-agent:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 8000
        env:
        - name: PUBSUB_NAME
          value: "kafka-pubsub"
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: postgres-secret
              key: url
        resources:
          requests:
            cpu: "100m"
            memory: "256Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 15
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 30
          timeoutSeconds: 5
          # Allow 3 consecutive failures before killing — DB cold-start can be slow
          failureThreshold: 5
---
apiVersion: v1
kind: Service
metadata:
  name: progress-agent
  namespace: learnflow
spec:
  selector:
    app: progress-agent
  ports:
  - port: 8000
    targetPort: 8000
